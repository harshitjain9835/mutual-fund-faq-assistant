name: Daily Data Ingestion

on:
  schedule:
    # Runs at 10:00 AM IST (4:30 AM UTC) every day
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  ingest-and-refresh:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Use Python to reliably clean hidden encoding issues (UTF-16 Null bytes, BOMs, Carriage Returns)
          python -c "raw = open('requirements.txt', 'rb').read(); text = raw.decode('utf-16' if b'\x00' in raw else 'utf-8-sig', errors='ignore').replace('\r', ''); open('clean_requirements.txt', 'w', encoding='utf-8').write(text)"
          echo "Sanitized requirements text:"
          cat clean_requirements.txt
          pip install -r clean_requirements.txt
          
      - name: Run Data Refresh Pipeline
        run: |
          python src/scheduler.py --run-once
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: automated daily data refresh [skip ci]" || echo "No changes to commit"
          git push
